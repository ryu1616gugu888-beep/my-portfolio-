<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTube Live Heart Gauge Overlay</title>
<style>
  /* ===================== CONFIG（後から差し替え可） =====================
     JS側の CONFIG オブジェクト（このファイル下部の <script> 冒頭）に
     VIDEO_ID / API_KEY / POLL_INTERVAL_MS / GAUGE_MAX をまとめてあります。
  ======================================================================= */

  html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background: transparent; /* OBSブラウザソースで背景を透過させる */
    overflow: hidden;
    font-family: 'Yu Gothic', 'Hiragino Maru Gothic ProN', 'Noto Sans JP', 'Segoe UI', sans-serif;
  }

  /* ---------------------------------------------------------------------
     プレビュー確認用の背景画像レイヤー。
     ★実際にOBSで使用する際は、この #preview-background の
       <div> ごと削除（または非表示に）して、透過に戻してください。
  --------------------------------------------------------------------- */
  #preview-background {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: #000 url('comment-icon.png') center 22% / cover no-repeat;
  }

  /* 背景画像に負けないよう、左側に暗いビネットを敷いて文字・ハートを見やすくする */
  #content-backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(90deg,
      rgba(0,0,0,0.6) 0%,
      rgba(0,0,0,0.48) 30%,
      rgba(0,0,0,0.22) 55%,
      rgba(0,0,0,0) 78%);
  }

  /* =====================================================================
     要素1〜5：左上〜左側に縦に並ぶメインスタック
     ===================================================================== */
  #overlay-root {
    position: fixed;
    top: 48px;
    left: 56px;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 240px;
  }

  /* ---------- 要素1：上部見出し ---------- */
  #main-heading {
    align-self: flex-start;
    margin: 0 0 18px;
    font-size: 32px;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.65), 0 0 2px rgba(0,0,0,0.5);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  #main-heading .heart-suffix {
    color: #ff4d9e;
    filter: drop-shadow(0 0 6px rgba(255,77,158,0.8));
  }

  /* ---------- 要素2：いいね数バッジ ---------- */
  #likes-badge {
    align-self: flex-start;
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 44px;
    padding: 0 18px 0 20px;
    margin-bottom: 22px;
    border-radius: 12px;
    border: 2px solid transparent;
    background:
      linear-gradient(#160a1f, #160a1f) padding-box,
      linear-gradient(90deg, #ff3fa2, #9b4bff) border-box;
    box-shadow: 0 0 16px rgba(155, 75, 255, 0.45), 0 0 10px rgba(255, 63, 162, 0.35);
  }
  #likes-badge .badge-heart {
    color: #ff4d9e;
    font-size: 15px;
    filter: drop-shadow(0 0 4px rgba(255,77,158,0.8));
  }
  #like-count {
    font-size: 19px;
    font-weight: 800;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
  }
  #likes-badge .badge-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #e79bf0;
  }

  @keyframes likePop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  #like-count.like-pop-active { animation: likePop 0.4s ease; }

  /* ---------- 要素3：レベルバッジ ---------- */
  #level-badge {
    width: 66px;
    height: 66px;
    border-radius: 50%;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 35% 30%, #ffb0da, #ff5fac 75%);
    box-shadow: 0 4px 16px rgba(255, 95, 172, 0.55), 0 0 0 3px rgba(255,255,255,0.08) inset;
    color: #ffffff;
  }
  #level-badge .lv-label { font-size: 12px; font-weight: 700; line-height: 1; opacity: 0.95; }
  #level-badge .lv-num { font-size: 24px; font-weight: 800; line-height: 1.1; }

  @keyframes levelBadgePulse {
    0%   { box-shadow: 0 4px 16px rgba(255,95,172,0.55); transform: scale(1); }
    35%  { box-shadow: 0 0 44px rgba(255,176,218,1), 0 0 76px rgba(255,95,172,0.85); transform: scale(1.2); }
    100% { box-shadow: 0 4px 16px rgba(255,95,172,0.55); transform: scale(1); }
  }
  #level-badge.level-up-active { animation: levelBadgePulse 0.9s ease; }

  /* ---------- 要素4：ハート型ゲージ ---------- */
  #heart-gauge-wrap {
    position: relative;
    width: 220px;
    margin-bottom: 16px;
  }
  .mini-heart-top {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5fac;
    font-size: 20px;
    filter: drop-shadow(0 0 6px rgba(255,95,172,0.8));
    z-index: 2;
  }
  #heart-svg {
    width: 220px;
    height: 199px;
    display: block;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.35));
  }
  /* ハート内の液体：縦位置（満タン度合い）はJSがtransformで滑らかにアニメーション */
  #heartFillGroup {
    transition: transform 0.7s cubic-bezier(.22,.9,.34,1);
  }
  /* 液体の水面を左右にゆっくりループさせ、波打っているように見せる */
  .wave-scroll path {
    fill: url(#fillGradient);
  }
  #gauge-overlay-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 14px;
    box-sizing: border-box;
    pointer-events: none;
    text-align: center;
  }
  #reactions-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: #ffffff;
    opacity: 0.85;
    margin-bottom: 6px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  #gauge-numbers {
    font-size: 21px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 6px rgba(0,0,0,0.55);
  }
  #gauge-numbers .sep { opacity: 0.75; margin: 0 3px; font-weight: 600; }
  #remaining-count { display: none; } /* ロジック用の値を保持するだけの非表示要素 */

  /* レベルアップ時の弾けるバースト演出 */
  #levelup-burst {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    margin: -110px 0 0 -110px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,176,218,0.6) 40%, rgba(255,95,172,0) 75%);
    opacity: 0;
    pointer-events: none;
  }
  @keyframes burstPop {
    0%   { transform: scale(0.3); opacity: 0.95; }
    60%  { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(2); opacity: 0; }
  }
  #levelup-burst.burst-active { animation: burstPop 0.8s ease-out; }

  /* 「LEVEL UP!」テキストポップ */
  #levelup-text {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 8px #ff5fac, 0 0 16px #ff5fac;
    letter-spacing: 0.05em;
    opacity: 0;
    white-space: nowrap;
    z-index: 3;
  }
  @keyframes levelUpTextPop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(6px) scale(0.8); }
    20%  { opacity: 1; transform: translateX(-50%) translateY(-4px) scale(1.1); }
    75%  { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-22px) scale(0.95); }
  }
  #levelup-text.text-pop-active { animation: levelUpTextPop 1.4s ease; }

  /* ---------- 要素5：目標テキスト ---------- */
  #tagline {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    color: #ef8fe0;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    text-align: center;
  }

  /* =====================================================================
     要素6：下部の呼びかけテキスト
     ===================================================================== */
  #subscribe-cta {
    position: fixed;
    left: 56px;
    top: 660px;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #subscribe-cta .cta-line1 {
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  #subscribe-cta .cta-line2 {
    font-size: 27px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  #subscribe-cta .cta-line3 {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.28em;
    opacity: 0.9;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  /* =====================================================================
     要素7：左下のコメント風バー
     ===================================================================== */
  #comment-bar {
    position: fixed;
    left: 0;
    bottom: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 620px;
    height: 58px;
    padding: 0 20px 0 8px;
    background: rgba(10, 6, 14, 0.6);
    backdrop-filter: blur(2px);
  }
  #comment-bar .comment-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    object-position: 50% 35%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
    background: #f4e9f7;
  }
  #comment-bar .comment-text {
    font-size: 15px;
    font-weight: 500;
    color: #f0e6ff;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- プレビュー確認用の背景（OBS本番投入時は削除して透過に戻す） -->
<div id="preview-background"></div>

<!-- 背景に負けないようにするための暗いビネット -->
<div id="content-backdrop"></div>

<!-- 要素1〜5：メインの縦並びスタック -->
<div id="overlay-root">

  <h1 id="main-heading">高評価ハートあつめてます<span class="heart-suffix">&#10084;</span></h1>

  <div id="likes-badge">
    <span class="badge-heart">&#10084;</span>
    <span id="like-count">0</span>
    <span class="badge-label">LIKES</span>
  </div>

  <div id="level-badge">
    <span class="lv-label">Lv.</span>
    <span class="lv-num" id="level-num">1</span>
  </div>

  <div id="heart-gauge-wrap">
    <div id="levelup-text">LEVEL UP!</div>
    <div class="mini-heart-top">&#10084;</div>

    <svg id="heart-svg" viewBox="0 0 32 30">
      <defs>
        <clipPath id="heartClip">
          <path d="M28.9,3.9C25.6,0.9,20.5,1.4,17.4,4.8L16,6.3l-1.4-1.5C11.5,1.4,6.4,0.9,3.1,3.9C-0.6,7.2,-0.8,13,2.2,16.7C6.73,22.29,11.5,27.8,16,29.8C20.5,27.8,25.27,22.29,29.8,16.7C32.6,13,32.8,7.2,28.9,3.9Z"/>
        </clipPath>
        <linearGradient id="fillGradient" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="#ff3fa2"/>
          <stop offset="100%" stop-color="#ffb0da"/>
        </linearGradient>
      </defs>
      <!-- ハートの下地：ごく薄いうっすら塗りのみ（輪郭線はここでは描かない） -->
      <path d="M28.9,3.9C25.6,0.9,20.5,1.4,17.4,4.8L16,6.3l-1.4-1.5C11.5,1.4,6.4,0.9,3.1,3.9C-0.6,7.2,-0.8,13,2.2,16.7C6.73,22.29,11.5,27.8,16,29.8C20.5,27.8,25.27,22.29,29.8,16.7C32.6,13,32.8,7.2,28.9,3.9Z"
            fill="rgba(255,255,255,0.06)"/>
      <!-- ハート型にクリップした「液体」の塗り。波打つ水面が左右にループしつつ、
           満タン度合いに応じて縦位置(translateY)がJSで滑らかにアニメーションする -->
      <g clip-path="url(#heartClip)">
        <g id="heartFillGroup">
          <g class="wave-scroll">
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-8 0" dur="1.6s" repeatCount="indefinite"/>
            <path d="M-8,0 Q-6,-0.35 -4,0 Q-2,0.35 0,0 Q2,-0.35 4,0 Q6,0.35 8,0 Q10,-0.35 12,0 Q14,0.35 16,0 Q18,-0.35 20,0 Q22,0.35 24,0 Q26,-0.35 28,0 Q30,0.35 32,0 Q34,-0.35 36,0 Q38,0.35 40,0 L40,35 L-8,35 Z"/>
          </g>
        </g>
      </g>
      <!-- ハートの輪郭：液体の上から最後に描画することで、途切れず常に綺麗な一本の曲線に見える -->
      <path d="M28.9,3.9C25.6,0.9,20.5,1.4,17.4,4.8L16,6.3l-1.4-1.5C11.5,1.4,6.4,0.9,3.1,3.9C-0.6,7.2,-0.8,13,2.2,16.7C6.73,22.29,11.5,27.8,16,29.8C20.5,27.8,25.27,22.29,29.8,16.7C32.6,13,32.8,7.2,28.9,3.9Z"
            fill="none" stroke="#f3f1f6" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>

    <div id="gauge-overlay-text">
      <div id="reactions-label">REACTIONS</div>
      <div id="gauge-numbers"><span id="gauge-current">0</span><span class="sep">/</span><span id="gauge-max">100</span></div>
    </div>

    <div id="levelup-burst"></div>
  </div>

  <p id="tagline">100万いいねを目指して&#10084;</p>

</div>

<!-- 要素6：下部の呼びかけテキスト -->
<div id="subscribe-cta">
  <div class="cta-line1">チャンネル登録</div>
  <div class="cta-line2">コメントおねがいします</div>
  <div class="cta-line3">Please subscribe</div>
</div>

<!-- 要素7：左下のコメント風バー -->
<div id="comment-bar">
  <img class="comment-icon" src="comment-icon.png" alt="コメント投稿者アイコン">
  <span class="comment-text">ASMR活動場所は概要欄&#8595;ファンサイト入会してね&#9825;</span>
</div>

<script>
(function () {
  'use strict';

  // ===================== CONFIG（差し替え用の定数） =====================
  const CONFIG = {
    VIDEO_ID: 'C58nXm7Zang',
    API_KEY: 'YOUR_YOUTUBE_API_KEY_HERE',
    POLL_INTERVAL_MS: 10000, // 10秒間隔でポーリング
    GAUGE_MAX: 100,          // 100いいねでハートが満タン（次のレベルへ）
  };
  // ======================================================================

  // ---- 状態 ----
  let previousLikeCount = null;   // 前回ポーリング時点のlikeCount（初回はnull）
  let displayedLikeCount = 0;     // 現在画面に表示している数値（カウントアップ用）
  let previousHundredBlock = 0;   // floor(合計いいね数 / GAUGE_MAX)。満タン切り替わり検知用
  const HEART_FILL_BOTTOM_Y = 30; // fraction=0のときの水面位置（ハート底）
  const HEART_FILL_TOP_Y = 3;     // fraction=1のときの水面位置（頂点のくびれから少し余裕を持たせる）

  // ---- DOM参照 ----
  const el = {
    levelNum: document.getElementById('level-num'),
    levelBadge: document.getElementById('level-badge'),
    heartFillGroup: document.getElementById('heartFillGroup'),
    gaugeCurrent: document.getElementById('gauge-current'),
    gaugeMax: document.getElementById('gauge-max'),
    likeCount: document.getElementById('like-count'),
    levelupBurst: document.getElementById('levelup-burst'),
    levelupText: document.getElementById('levelup-text'),
  };

  el.gaugeMax.textContent = CONFIG.GAUGE_MAX.toLocaleString('en-US');

  // ===================== YouTube Data API 呼び出し =====================
  async function fetchLikeCount() {
    const url = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${CONFIG.VIDEO_ID}&key=${CONFIG.API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      throw new Error(`YouTube API HTTPエラー: ${res.status} ${res.statusText}`);
    }
    const data = await res.json();
    const item = data.items && data.items[0];
    if (!item || !item.statistics || item.statistics.likeCount === undefined) {
      throw new Error('YouTube APIレスポンスにlikeCountが見つかりません（VIDEO_IDを確認してください）');
    }
    const likeCount = parseInt(item.statistics.likeCount, 10);
    if (Number.isNaN(likeCount)) {
      throw new Error('likeCountの値が数値として解釈できません');
    }
    return likeCount;
  }

  async function poll() {
    try {
      const likeCount = await fetchLikeCount();
      handleNewLikeCount(likeCount);
    } catch (err) {
      // 画面はクラッシュさせず、コンソールにエラーを出して次回リトライに任せる
      console.error('[overlay] いいね数の取得に失敗しました:', err);
    }
  }

  // ===================== いいね数の反映ロジック =====================
  function handleNewLikeCount(newCount) {
    if (previousLikeCount === null) {
      // 初回はレベルアップ演出を出さず、表示だけ合わせる
      previousLikeCount = newCount;
      displayedLikeCount = newCount;
      el.likeCount.textContent = newCount.toLocaleString('en-US');
      previousHundredBlock = Math.floor(newCount / CONFIG.GAUGE_MAX);
      updateLevelAndGauge(newCount);
      return;
    }

    const delta = newCount - previousLikeCount;
    previousLikeCount = newCount;

    if (delta > 0) {
      animateCountUp(displayedLikeCount, newCount);
      popLikeCount();
    } else {
      // 減少・変化なしの場合は表示だけ同期
      animateCountUp(displayedLikeCount, newCount);
    }

    updateLevelAndGauge(newCount);
  }

  // レベル：現在の合計いいね数 ÷ GAUGE_MAX(=100) を四捨五入した値
  // ゲージ：合計いいね数を100で割った「あまり」で、100いいねごとに満タン→リセットを繰り返す
  function updateLevelAndGauge(totalCount) {
    const newLevel = Math.round(totalCount / CONFIG.GAUGE_MAX);
    const newHundredBlock = Math.floor(totalCount / CONFIG.GAUGE_MAX);
    const remainder = totalCount % CONFIG.GAUGE_MAX;
    const fraction = remainder / CONFIG.GAUGE_MAX;

    el.levelNum.textContent = newLevel;
    el.gaugeCurrent.textContent = remainder.toLocaleString('en-US');
    updateGaugeVisual(fraction);

    // 100の位が繰り上がった（＝ハートが満タンになった）タイミングでレベルアップ演出
    if (newHundredBlock > previousHundredBlock) {
      triggerLevelUpEffect();
    }
    previousHundredBlock = newHundredBlock;
  }

  function updateGaugeVisual(fraction) {
    const f = Math.max(0, Math.min(1, fraction));
    // fraction=0で水面がハート底(29)へ、fraction=1で水面が頂点くびれの少し下(3)へ
    const translateY = (HEART_FILL_BOTTOM_Y - f * (HEART_FILL_BOTTOM_Y - HEART_FILL_TOP_Y)).toFixed(2);
    el.heartFillGroup.style.transform = `translateY(${translateY}px)`;
  }

  function triggerLevelUpEffect() {
    // レベルバッジのパルス
    el.levelBadge.classList.remove('level-up-active');
    void el.levelBadge.offsetWidth; // reflow re-trigger
    el.levelBadge.classList.add('level-up-active');

    // ハート周りの弾けるバースト
    el.levelupBurst.classList.remove('burst-active');
    void el.levelupBurst.offsetWidth;
    el.levelupBurst.classList.add('burst-active');

    // 「LEVEL UP!」テキストポップ
    el.levelupText.classList.remove('text-pop-active');
    void el.levelupText.offsetWidth;
    el.levelupText.classList.add('text-pop-active');
  }

  function popLikeCount() {
    el.likeCount.classList.remove('like-pop-active');
    void el.likeCount.offsetWidth;
    el.likeCount.classList.add('like-pop-active');
  }

  // ===================== 数字のカウントアップアニメーション =====================
  let countAnimFrameId = null;
  function animateCountUp(from, to) {
    const duration = 900;
    const startTime = performance.now();
    if (countAnimFrameId) cancelAnimationFrame(countAnimFrameId);

    function step(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out-cubic
      const value = Math.round(from + (to - from) * eased);
      el.likeCount.textContent = value.toLocaleString('en-US');
      if (progress < 1) {
        countAnimFrameId = requestAnimationFrame(step);
      } else {
        displayedLikeCount = to;
        el.likeCount.textContent = to.toLocaleString('en-US');
      }
    }
    countAnimFrameId = requestAnimationFrame(step);
  }

  // ===================== 起動 =====================
  poll(); // 初回は即時実行
  setInterval(poll, CONFIG.POLL_INTERVAL_MS);
})();
</script>

</body>
</html>
